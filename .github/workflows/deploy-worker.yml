name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'apps/worker/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Build worker
        run: pnpm --filter @sharehtml/worker run build
        env:
          CLOUDFLARE_ENV: production

      - name: Set Clerk secrets in Cloudflare Workers
        run: |
          echo "$CLERK_SECRET_KEY" | pnpm --filter @sharehtml/worker exec wrangler secret put CLERK_SECRET_KEY --env production
          echo "$CLERK_JWT_KEY" | pnpm --filter @sharehtml/worker exec wrangler secret put CLERK_JWT_KEY --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @sharehtml/worker run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
